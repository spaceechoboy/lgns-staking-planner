<!doctype html><meta charset=utf-8><title>planner core test</title><script>
const CORE = {
  decUint(hex){ return BigInt(hex); },
  decEpochDistribute(hex){ const h=hex.slice(2); return BigInt('0x'+h.slice(192,256)); }, // 4번째 word
  decInfoRate(hex){ return parseInt(hex.slice(2).slice(0,64),16); },
  measuredPct(dist, circ){ return circ>0n ? Number(dist)/Number(circ)*100 : null; },
  setPctFromInfo(r1e6){ return r1e6/1e6*100; },
  indexDeltaPct(a,b,eH,epH){ if(!(b>0)||!(eH>0)||!(a>b)) return null; return (Math.pow(a/b,epH/eH)-1)*100; },
  accumDeltaPct(now,prev,depoch,denom){ if(!(depoch>0)) return null; const d=now-prev; if(d<0n) return 0; return Number(d)/depoch/Number(denom)*100; },
  bucket(P0, rc, hc, rs, hs, t, periodic, reinv){
    if(!P0) return 0;
    let tc=t; if(periodic){ tc=Math.floor(t/(hc||1))*(hc||1); }
    const comp = P0*Math.pow(1+rc, tc/(hc||1));
    if(!(rs>0)) return comp;
    if(reinv && reinv.on){
      const ev=reinv.everyH, N=reinv.norm, chunk=P0*rs*(ev/(hs||1));
      let acc=0;
      for(let k=1; k*ev <= t+1e-9; k++){ const age=t-k*ev; const ac=periodic?Math.floor(age/(N.hc||1))*(N.hc||1):age; acc+=chunk*Math.pow(1+N.rc, ac/(N.hc||1)); }
      return comp+acc;
    }
    let ts=t; if(periodic){ ts=Math.floor(t/(hs||1))*(hs||1); }
    return comp + P0*rs*(ts/(hs||1));
  },
};
function pad64(n){ return BigInt(n).toString(16).padStart(64,'0'); }
function runSelfTests(){
  const C=CORE, A=console.assert;
  const epochHex='0x'+pad64(14400)+pad64(2348)+pad64(88151112)+pad64('3811176577537954');
  A(C.decEpochDistribute(epochHex)===3811176577537954n,'distribute word3');
  A(C.decInfoRate('0x'+pad64(1397))===1397,'info rate word0');
  A(C.decUint('0x'+pad64(679718117070))===679718117070n,'uint');
  A(Math.abs(C.measuredPct(3811176577537954n,2562188574991321600n)-0.14875)<0.001,'measured');
  A(Math.abs(C.setPctFromInfo(1397)-0.1397)<1e-9,'set 1397');
  A(Math.abs(C.indexDeltaPct(1.001,1.0,7,7)-0.1)<1e-6,'indexDelta same-epoch');
  A(C.indexDeltaPct(1.0,1.0,7,7)===null,'indexDelta no-growth → null');
  A(Math.abs(C.accumDeltaPct(124000000n,113500000n,7,1000000000n)-0.15)<1e-9,'accum 0.15/ep (Δ10.5M/7ep/1e9)');
  A(C.accumDeltaPct(100n,100n,0,1000000000n)===null,'accum Δepoch=0 → null');
  A(C.accumDeltaPct(100n,200n,5,1000000000n)===0,'accum 음수 → 0');
  A(Math.abs(C.bucket(100,0.001,7,0,12,7,false,null)-100.1)<1e-6,'compound only');
  A(Math.abs(C.bucket(100,0,1,0.00195,12,12,false,null)-100.195)<1e-6,'extra simple');
  A(Math.abs(C.bucket(100,0,1,0.00195,12,12,false,{on:false})-100.195)<1e-9,'reinv off==simple');
  A(C.bucket(100,0.001,7,0.00195,12,240,false,{on:true,everyH:48,norm:{rc:0.001,hc:7}}) >= C.bucket(100,0.001,7,0.00195,12,240,false,null)-1e-9,'reinv >= simple');
  A(C.bucket(0,0.001,7,0.00195,12,100,false,null)===0,'zero principal');
  console.log('CORE: tests run');
}
runSelfTests();
</script>
