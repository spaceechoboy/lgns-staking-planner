name: snapshot rates
on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (UTC)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: rates
  cancel-in-progress: false
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: snapshot
        run: python3 snapshot_rates.py
      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet rates.json; then
            git add rates.json
            git commit -m "chore(rates): snapshot $(date -u +%FT%TZ)"
            git push
          else
            echo "no change"
          fi
